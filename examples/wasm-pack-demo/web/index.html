<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>glemu wasm-pack demo</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #111827;
        color: #e5e7eb;
        font: 14px/1.4 system-ui, sans-serif;
      }

      body {
        display: grid;
        grid-template-rows: 1fr auto;
      }

      canvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      .caption {
        padding: 12px 16px;
        background: rgba(17, 24, 39, 0.96);
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div class="caption">
      This demo creates a WebGL2 context in JavaScript, passes it into a wasm-bindgen
      <code>Demo</code>, and uses <code>glemu::Context</code> to manage the shader program,
      buffer, and vertex array for an animated triangle.
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
